# LPO-Emotion-VLM 配置文件

# 模型配置
model:
  name: "liuhaotian/llava-v1.5-7b"
  torch_dtype: "float16"
  device_map: "auto"

# LoRA配置
lora:
  r: 8
  lora_alpha: 16
  target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# LPO配置
lpo:
  beta: 0.1  # 温度参数
  n_items: 4  # 排序列表长度

# 训练配置
training:
  output_dir: "./checkpoints/lpo_model"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4  # 有效batch size = 16
  learning_rate: 2.0e-5
  warmup_steps: 100
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  evaluation_strategy: "steps"
  save_strategy: "steps"
  load_best_model_at_end: true
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  report_to: "wandb"
  remove_unused_columns: false
  dataloader_num_workers: 4
  save_total_limit: 3

# 数据配置
data:
  train_path: "./data/processed/preference_train.json"
  val_path: "./data/processed/preference_val.json"
  test_path: "./data/processed/preference_test.json"
  num_train_samples: 800
  num_val_samples: 100
  num_test_samples: 100
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# WandB配置
wandb:
  project: "lpo-emotion-vlm"
  entity: null  # 设置为你的WandB用户名
  name: "llava-lpo-experiment"
  tags: ["lpo", "emotion", "vlm", "llava"]

# 评估配置
evaluation:
  metrics: ["kendall_tau", "ndcg", "accuracy"]
  save_predictions: true
  visualize_results: true
